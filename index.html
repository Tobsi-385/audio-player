<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --color-bg:             #f7f6f2;
      --color-surface:        #f0ede8;
      --color-surface-2:      #e8e4de;
      --color-border:         #d4d1ca;
      --color-text:           #28251d;
      --color-text-muted:     #7a7974;
      --color-text-faint:     #bab9b4;
      --color-primary:        #01696f;
      --color-primary-hover:  #0c4e54;
      --color-primary-highlight: #cedcd8;
      --shadow-md: 0 4px 20px oklch(0.2 0.01 80 / 0.10);
      --shadow-lg: 0 12px 40px oklch(0.2 0.01 80 / 0.14);
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
      --radius-xl: 1rem; --radius-full: 9999px;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Work Sans', 'Helvetica Neue', sans-serif;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
      --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --color-bg:             #171614;
      --color-surface:        #1c1b19;
      --color-surface-2:      #252422;
      --color-border:         #393836;
      --color-text:           #cdccca;
      --color-text-muted:     #797876;
      --color-text-faint:     #5a5957;
      --color-primary:        #4f98a3;
      --color-primary-hover:  #227f8b;
      --color-primary-highlight: #313b3b;
      --shadow-md: 0 4px 20px oklch(0 0 0 / 0.30);
      --shadow-lg: 0 12px 40px oklch(0 0 0 / 0.45);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#252422;
        --color-border:#393836; --color-text:#cdccca; --color-text-muted:#797876;
        --color-text-faint:#5a5957; --color-primary:#4f98a3; --color-primary-hover:#227f8b;
        --color-primary-highlight:#313b3b;
        --shadow-md:0 4px 20px oklch(0 0 0/.30); --shadow-lg:0 12px 40px oklch(0 0 0/.45);
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base);
      color: var(--color-text); background: var(--color-bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: var(--space-8) var(--space-4);
      transition: background var(--transition-interactive), color var(--transition-interactive);
    }
    button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    .page-header {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: var(--space-4) var(--space-6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      background: oklch(from var(--color-bg) l c h / 0.85);
      border-bottom: 1px solid oklch(from var(--color-text) l c h / 0.07);
      z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: var(--space-2);
      font-family: var(--font-display); font-size: var(--text-lg);
      color: var(--color-text); text-decoration: none;
    }
    .theme-toggle {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-full); color: var(--color-text-muted);
      transition: color var(--transition-interactive), background var(--transition-interactive);
    }
    .theme-toggle:hover { color: var(--color-text); background: oklch(from var(--color-text) l c h / 0.06); }

    .player-wrapper { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: var(--space-6); }
    .player-card {
      background: var(--color-surface);
      border: 1px solid oklch(from var(--color-text) l c h / 0.08);
      border-radius: var(--radius-xl); padding: var(--space-8);
      box-shadow: var(--shadow-lg);
      transition: background var(--transition-interactive), border-color var(--transition-interactive);
    }

    .art-area {
      aspect-ratio: 1; border-radius: var(--radius-lg);
      background: var(--color-surface-2);
      border: 1px solid oklch(from var(--color-text) l c h / 0.06);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: var(--space-6); overflow: hidden; position: relative;
    }
    .art-placeholder { display: flex; flex-direction: column; align-items: center; gap: var(--space-3); color: var(--color-text-faint); }
    .art-placeholder svg { width: 56px; height: 56px; opacity: 0.5; }
    .art-placeholder span { font-size: var(--text-sm); }

    .eq-bars { display: flex; align-items: flex-end; gap: 3px; height: 40px; padding: 0 var(--space-2); }
    .eq-bar {
      width: 5px; border-radius: 3px; background: var(--color-primary); opacity: 0.85;
      transform-origin: bottom;
      animation: eq-bounce var(--dur, 0.8s) ease-in-out infinite alternate;
      animation-play-state: paused;
    }
    .eq-bar:nth-child(1){--dur:0.65s;height:22px} .eq-bar:nth-child(2){--dur:0.45s;height:36px}
    .eq-bar:nth-child(3){--dur:0.55s;height:28px} .eq-bar:nth-child(4){--dur:0.38s;height:38px}
    .eq-bar:nth-child(5){--dur:0.60s;height:20px} .eq-bar:nth-child(6){--dur:0.50s;height:32px}
    .eq-bar:nth-child(7){--dur:0.42s;height:26px}
    .is-playing .eq-bar { animation-play-state: running; }
    @keyframes eq-bounce { from { transform: scaleY(0.25); } to { transform: scaleY(1); } }

    .track-info { margin-bottom: var(--space-5); }
    .track-title {
      font-family: var(--font-display); font-size: var(--text-xl); color: var(--color-text);
      margin-bottom: var(--space-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-artist { font-size: var(--text-sm); color: var(--color-text-muted); }

    .progress-section { margin-bottom: var(--space-5); }
    .progress-bar-wrapper {
      height: 6px; background: oklch(from var(--color-text) l c h / 0.10);
      border-radius: var(--radius-full); cursor: pointer; position: relative; margin-bottom: var(--space-2);
    }
    .progress-fill {
      height: 100%; border-radius: var(--radius-full); background: var(--color-primary);
      width: 0%; transition: width 0.1s linear; pointer-events: none;
    }
    .progress-thumb {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      width: 14px; height: 14px; background: var(--color-primary);
      border-radius: var(--radius-full);
      box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.25);
      left: 0%; transition: left 0.1s linear; pointer-events: none;
    }
    .time-row {
      display: flex; justify-content: space-between;
      font-size: var(--text-xs); color: var(--color-text-muted); font-variant-numeric: tabular-nums;
    }

    .controls { display: flex; align-items: center; justify-content: center; gap: var(--space-6); margin-bottom: var(--space-6); }
    .ctrl-btn {
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-full); color: var(--color-text-muted);
      transition: color var(--transition-interactive), background var(--transition-interactive), transform 80ms ease;
    }
    .ctrl-btn:hover { color: var(--color-text); background: oklch(from var(--color-text) l c h / 0.07); }
    .ctrl-btn:active { transform: scale(0.92); }
    .play-btn {
      width: 60px; height: 60px; background: var(--color-primary); color: #fff;
      border-radius: var(--radius-full);
      box-shadow: 0 4px 14px oklch(from var(--color-primary) l c h / 0.40);
      transition: background var(--transition-interactive), transform 80ms ease, box-shadow var(--transition-interactive);
    }
    .play-btn:hover { background: var(--color-primary-hover); box-shadow: 0 6px 20px oklch(from var(--color-primary) l c h / 0.50); }
    .play-btn:active { transform: scale(0.92); }

    .volume-row { display: flex; align-items: center; gap: var(--space-3); }
    .volume-icon { color: var(--color-text-muted); flex-shrink: 0; }
    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 4px;
      border-radius: var(--radius-full); background: oklch(from var(--color-text) l c h / 0.12);
      outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      border-radius: var(--radius-full); background: var(--color-primary); cursor: pointer;
      box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.20);
      transition: transform 80ms ease;
    }
    input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.25); }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px; border: none; border-radius: var(--radius-full);
      background: var(--color-primary); cursor: pointer;
    }

    .upload-card {
      background: var(--color-surface);
      border: 1.5px dashed oklch(from var(--color-text) l c h / 0.18);
      border-radius: var(--radius-xl); padding: var(--space-6) var(--space-8);
      text-align: center; cursor: pointer;
      transition: border-color var(--transition-interactive), background var(--transition-interactive);
      display: block;
    }
    .upload-card:hover, .upload-card.drag-over {
      border-color: var(--color-primary);
      background: oklch(from var(--color-primary) l c h / 0.04);
    }
    .upload-card input[type="file"] { display: none; }
    .upload-icon { color: var(--color-primary); margin-bottom: var(--space-3); display: flex; justify-content: center; }
    .upload-title { font-size: var(--text-base); font-weight: 500; margin-bottom: var(--space-1); }
    .upload-hint { font-size: var(--text-xs); color: var(--color-text-muted); }

    .playlist-section { display: none; }
    .playlist-section.visible { display: block; }
    .playlist-header {
      font-size: var(--text-sm); font-weight: 600; color: var(--color-text-muted);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: var(--space-3);
    }
    .playlist { display: flex; flex-direction: column; gap: var(--space-2); }
    .playlist-item {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-4); border-radius: var(--radius-md);
      cursor: pointer; border: 1px solid transparent;
      transition: background var(--transition-interactive), border-color var(--transition-interactive);
    }
    .playlist-item:hover { background: oklch(from var(--color-text) l c h / 0.05); }
    .playlist-item.active {
      background: oklch(from var(--color-primary) l c h / 0.08);
      border-color: oklch(from var(--color-primary) l c h / 0.20);
    }
    .playlist-item .num {
      font-size: var(--text-xs); color: var(--color-text-faint);
      font-variant-numeric: tabular-nums; min-width: 20px; text-align: right;
    }
    .playlist-item.active .num { color: var(--color-primary); }
    .playlist-item .name { flex: 1; font-size: var(--text-sm); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .playlist-item .dur { font-size: var(--text-xs); color: var(--color-text-muted); font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

  <header class="page-header">
    <a class="logo" href="#">
      <svg aria-label="Audio Player Logo" viewBox="0 0 32 32" width="28" height="28" fill="none">
        <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
        <circle cx="16" cy="16" r="5" fill="currentColor" opacity="0.3"/>
        <circle cx="16" cy="16" r="2" fill="currentColor"/>
        <path d="M16 2 A14 14 0 0 1 30 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      </svg>
      Audioplayer
    </a>
    <button class="theme-toggle" data-theme-toggle aria-label="Zu hellem Modus wechseln">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <main style="width:100%;display:flex;justify-content:center;padding-top:80px;">
    <div class="player-wrapper">

      <div class="player-card">
        <div class="art-area" id="artArea">
          <div class="art-placeholder" id="artPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
            </svg>
            <span>Noch keine Audiodatei</span>
          </div>
          <div class="eq-bars" id="eqBars" style="display:none;">
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            <div class="eq-bar"></div>
          </div>
        </div>

        <div class="track-info">
          <div class="track-title" id="trackTitle">Keine Datei geladen</div>
          <div class="track-artist" id="trackArtist">Lade eine Audio-Datei hoch</div>
        </div>

        <div class="progress-section">
          <div class="progress-bar-wrapper" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-thumb" id="progressThumb"></div>
          </div>
          <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>

        <div class="controls">
          <button class="ctrl-btn" id="prevBtn" aria-label="Vorheriger Titel">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="play-btn" id="playBtn" aria-label="Abspielen">
            <svg id="playIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pauseIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="ctrl-btn" id="nextBtn" aria-label="Naechster Titel">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm8.5-6v6H17V6h-2.5v6z"/></svg>
          </button>
        </div>

        <div class="volume-row">
          <svg class="volume-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" aria-label="Lautstaerke">
        </div>
      </div>

      <label class="upload-card" for="fileInput" id="uploadCard"
        tabindex="0" role="button" aria-label="Audio-Datei hochladen">
        <input type="file" id="fileInput" accept="audio/*" multiple>
        <div class="upload-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="upload-title">Audio-Datei hochladen</div>
        <div class="upload-hint">MP3, WAV, FLAC, OGG, M4A &middot; Mehrere Dateien moeglich</div>
      </label>

      <div class="playlist-section" id="playlistSection">
        <div class="playlist-header">Wiedergabeliste</div>
        <div class="playlist" id="playlist"></div>
      </div>

    </div>
  </main>

  <script>
    (function(){
      const toggle = document.querySelector('[data-theme-toggle]');
      const root = document.documentElement;
      let dark = matchMedia('(prefers-color-scheme:dark)').matches;
      root.setAttribute('data-theme', dark ? 'dark' : 'light');
      const moonSVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      const sunSVG  = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      function update() {
        root.setAttribute('data-theme', dark ? 'dark' : 'light');
        toggle.innerHTML = dark ? moonSVG : sunSVG;
        toggle.setAttribute('aria-label', dark ? 'Zu hellem Modus wechseln' : 'Zu dunklem Modus wechseln');
      }
      update();
      toggle.addEventListener('click', () => { dark = !dark; update(); });
    })();

    const audio = new Audio();
    let tracks = [], currentIndex = 0, isPlaying = false, isDragging = false;

    const playBtn        = document.getElementById('playBtn');
    const playIcon       = document.getElementById('playIcon');
    const pauseIcon      = document.getElementById('pauseIcon');
    const trackTitle     = document.getElementById('trackTitle');
    const trackArtist    = document.getElementById('trackArtist');
    const progressFill   = document.getElementById('progressFill');
    const progressThumb  = document.getElementById('progressThumb');
    const progressBar    = document.getElementById('progressBar');
    const currentTimeEl  = document.getElementById('currentTime');
    const totalTimeEl    = document.getElementById('totalTime');
    const volumeSlider   = document.getElementById('volumeSlider');
    const prevBtn        = document.getElementById('prevBtn');
    const nextBtn        = document.getElementById('nextBtn');
    const playlistEl     = document.getElementById('playlist');
    const playlistSection= document.getElementById('playlistSection');
    const artPlaceholder = document.getElementById('artPlaceholder');
    const eqBars         = document.getElementById('eqBars');
    const artArea        = document.getElementById('artArea');
    const fileInput      = document.getElementById('fileInput');
    const uploadCard     = document.getElementById('uploadCard');

    audio.volume = 0.8;

    function fmt(s) {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return m + ':' + String(sec).padStart(2, '0');
    }

    function loadTrack(index) {
      if (!tracks.length) return;
      currentIndex = (index + tracks.length) % tracks.length;
      const t = tracks[currentIndex];
      audio.src = t.url;
      trackTitle.textContent = t.name;
      trackArtist.textContent = t.size;
      document.querySelectorAll('.playlist-item').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
        el.querySelector('.num').textContent = i === currentIndex ? '\u25B6' : i + 1;
      });
      progressFill.style.width = '0%';
      progressThumb.style.left = '0%';
      currentTimeEl.textContent = '0:00';
      totalTimeEl.textContent = '0:00';
      artPlaceholder.style.display = 'none';
      eqBars.style.display = 'flex';
    }

    function setPlayState(playing) {
      isPlaying = playing;
      playIcon.style.display  = playing ? 'none' : '';
      pauseIcon.style.display = playing ? '' : 'none';
      artArea.classList.toggle('is-playing', playing);
    }

    function playPause() {
      if (!tracks.length) return;
      if (isPlaying) { audio.pause(); setPlayState(false); }
      else { audio.play(); setPlayState(true); }
    }

    playBtn.addEventListener('click', playPause);
    prevBtn.addEventListener('click', () => { loadTrack(currentIndex - 1); if (isPlaying) audio.play(); });
    nextBtn.addEventListener('click', () => { loadTrack(currentIndex + 1); if (isPlaying) audio.play(); });
    audio.addEventListener('ended', () => { loadTrack(currentIndex + 1); audio.play(); setPlayState(true); });

    audio.addEventListener('timeupdate', () => {
      if (isDragging || !audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      progressThumb.style.left = pct + '%';
      currentTimeEl.textContent = fmt(audio.currentTime);
    });
    audio.addEventListener('loadedmetadata', () => { totalTimeEl.textContent = fmt(audio.duration); });

    function seekFromEvent(e) {
      const rect = progressBar.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const pct = Math.max(0, Math.min(1, x / rect.width));
      audio.currentTime = pct * audio.duration;
      progressFill.style.width = (pct * 100) + '%';
      progressThumb.style.left = (pct * 100) + '%';
    }
    progressBar.addEventListener('mousedown', e => { isDragging = true; seekFromEvent(e); });
    progressBar.addEventListener('touchstart', e => { isDragging = true; seekFromEvent(e); }, { passive: true });
    window.addEventListener('mousemove', e => { if (isDragging) seekFromEvent(e); });
    window.addEventListener('touchmove', e => { if (isDragging) seekFromEvent(e); }, { passive: true });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('touchend', () => { isDragging = false; });

    volumeSlider.addEventListener('input', () => { audio.volume = volumeSlider.value; });

    uploadCard.addEventListener('dragover', e => { e.preventDefault(); uploadCard.classList.add('drag-over'); });
    uploadCard.addEventListener('dragleave', () => uploadCard.classList.remove('drag-over'));
    uploadCard.addEventListener('drop', e => { e.preventDefault(); uploadCard.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    function handleFiles(files) {
      const audioFiles = Array.from(files).filter(f => f.type.startsWith('audio/') || /\.(mp3|wav|flac|ogg|m4a|aac|opus)$/i.test(f.name));
      if (!audioFiles.length) return;
      const startIdx = tracks.length;
      audioFiles.forEach(f => {
        tracks.push({ name: f.name.replace(/\.[^.]+$/, ''), size: fmtSize(f.size), url: URL.createObjectURL(f) });
      });
      renderPlaylist();
      loadTrack(startIdx);
    }

    function fmtSize(bytes) {
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function renderPlaylist() {
      playlistSection.classList.toggle('visible', tracks.length > 0);
      playlistEl.innerHTML = '';
      tracks.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
        div.innerHTML = '<span class="num">' + (i === currentIndex ? '\u25B6' : i + 1) + '</span><span class="name">' + t.name + '</span><span class="dur">' + t.size + '</span>';
        div.addEventListener('click', () => { loadTrack(i); audio.play(); setPlayState(true); });
        playlistEl.appendChild(div);
      });
    }

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); playPause(); }
      if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 5);
      if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5);
    });
  </script>
</body>
</html>
