<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musikplayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Work Sans", sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      transition: background 0.6s ease;
    }

    .player {
      width: min(100%, 400px);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,.55);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(12px);
    }

    .cover {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .meta {
      margin-bottom: 18px;
    }

    .composer {
      font-size: 0.85rem;
      color: rgba(255,255,255,.5);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 4px;
    }

    h1 {
      font-family: "Instrument Serif", serif;
      font-size: clamp(1.5rem, 1rem + 1.2vw, 2rem);
      line-height: 1.2;
      margin-bottom: 2px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,.45);
      font-style: italic;
    }

    .bar {
      height: 5px;
      background: rgba(255,255,255,.1);
      border-radius: 999px;
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 6px;
      margin-top: 18px;
    }

    .fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: rgba(255,255,255,.8);
      transition: width .1s linear;
    }

    .times {
      display: flex;
      justify-content: space-between;
      color: rgba(255,255,255,.4);
      font-size: .82rem;
      font-variant-numeric: tabular-nums;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .play {
      width: 60px;
      height: 60px;
      border: none;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      color: #0d0d0d;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
      transition: transform .1s, opacity .15s;
    }

    .play:hover { opacity: .88; }
    .play:active { transform: scale(.94); }

    .volume {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,.4);
      font-size: .9rem;
    }

    .volume input { width: 100%; }

    input[type=range] {
      -webkit-appearance: none;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      cursor: pointer;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: white;
    }

    .not-found {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      color: rgba(255,255,255,.5);
    }

    .not-found .icon { font-size: 3rem; }
    .not-found h2 { font-family: "Instrument Serif", serif; font-size: 1.6rem; color: #f0f0f0; }
    .not-found p { max-width: 28ch; font-size: .9rem; }
  </style>
</head>
<body>

  <div class="player" id="player" style="display:none">
    <div class="cover">
      <img id="coverImg" src="" alt="Cover" width="400" height="400" loading="eager">
    </div>

    <div class="meta">
      <div class="composer" id="composer"></div>
      <h1 id="title"></h1>
      <div class="subtitle" id="subtitle"></div>
    </div>

    <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
    <div class="times"><span id="current">0:00</span><span id="total">0:00</span></div>

    <div class="controls">
      <button class="play" id="toggle" aria-label="Abspielen oder pausieren">&#9654;</button>
    </div>

    <div class="volume">
      <span>&#128266;</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8" aria-label="Lautstärke">
    </div>

    <audio id="audio" preload="metadata"></audio>
  </div>

  <div class="not-found" id="notFound">
    <div class="icon">&#127926;</div>
    <h2>Kein Stück gefunden</h2>
    <p>Bitte scanne einen der QR-Codes.</p>
  </div>

  <script>
    const SONGS = {
      mondschein: {
        composer: "Ludwig van Beethoven",
        title: "Mondscheinsonate",
        subtitle: "1. Satz – Adagio sostenuto",
        file: "mondscheinsonate-1satz.mp3",
        cover: "ChatGPT Image 19. Mai 2026, 09_31_28.png",
        bg: "#05080f"
      },
      herbstlied: {
        composer: "Felix Mendelssohn Bartholdy",
        title: "Herbstlied",
        subtitle: "Für zwei Trompeten",
        file: "herbstlied-mendelssohn-bartholdy.mp3",
        cover: "ChatGPT Image 18. Mai 2026, 09_41_17.png",
        bg: "#120a02"
      },
      cantabile: {
        composer: "George Enescu",
        title: "Cantabile et Presto",
        subtitle: "Für Flöte und Klavier",
        file: "Cantabile er Presto George Enescu.mp3",
        cover: "ChatGPT Image 18. Mai 2026, 12_17_02.png",
        bg: "#05080f"
      }
    };

    const audio    = document.getElementById('audio');
    const toggle   = document.getElementById('toggle');
    const volInput = document.getElementById('volume');
    const fill     = document.getElementById('fill');
    const bar      = document.getElementById('bar');
    const current  = document.getElementById('current');
    const total    = document.getElementById('total');
    const player   = document.getElementById('player');
    const notFound = document.getElementById('notFound');
    const coverImg = document.getElementById('coverImg');
    const composer = document.getElementById('composer');
    const titleEl  = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');

    const fmt = s => {
      if (!s || isNaN(s)) return '0:00';
      return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
    };

    function load() {
      const hash = window.location.hash.replace('#','').toLowerCase();
      const song = SONGS[hash];

      if (!song) {
        player.style.display = 'none';
        notFound.style.display = 'flex';
        document.body.style.background = '#0d0d0d';
        return;
      }

      notFound.style.display = 'none';
      player.style.display = 'block';
      document.body.style.background = song.bg;
      document.title = song.title + ' – ' + song.composer;

      composer.textContent = song.composer;
      titleEl.textContent  = song.title;
      subtitle.textContent = song.subtitle;
      coverImg.src = encodeURI(song.cover);
      coverImg.alt = song.title;

      audio.pause();
      audio.src = encodeURI(song.file);
      audio.load();
      fill.style.width = '0';
      current.textContent = '0:00';
      total.textContent   = '0:00';
      toggle.innerHTML    = '&#9654;';
    }

    const syncBtn = () => {
      toggle.innerHTML = audio.paused ? '&#9654;' : '&#9646;&#9646;';
    };

    toggle.addEventListener('click', async () => {
      if (audio.paused) { await audio.play(); } else { audio.pause(); }
      syncBtn();
    });

    volInput.addEventListener('input', () => audio.volume = +volInput.value);

    audio.addEventListener('loadedmetadata', () => {
      total.textContent = fmt(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      fill.style.width = pct + '%';
      current.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('play',  syncBtn);
    audio.addEventListener('pause', syncBtn);
    audio.addEventListener('ended', syncBtn);
    audio.volume = 0.8;

    bar.addEventListener('click', e => {
      const r = bar.getBoundingClientRect();
      const p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
      if (audio.duration) audio.currentTime = p * audio.duration;
    });

    window.addEventListener('hashchange', load);
    load();
  </script>
</body>
</html>
