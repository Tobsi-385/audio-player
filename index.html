<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC Bayern Goal Song</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #151214;
      --surface: #1d181b;
      --surface-2: #281f24;
      --text: #f0e8eb;
      --muted: #b8aab0;
      --primary: #dc052d;
      --primary-hover: #a8001d;
      --radius: 20px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(220,5,45,.18), transparent 35%), var(--bg);
      color: var(--text);
      font-family: "Work Sans", sans-serif;
    }

    .player {
      width: min(100%, 420px);
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: 0 18px 45px rgba(0,0,0,.35);
    }

    .cover {
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, rgba(220,5,45,.22), rgba(220,5,45,.04));
      display: grid;
      place-items: center;
      margin-bottom: 22px;
      border: 1px solid rgba(255,255,255,.08);
    }

    .disc {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 40px rgba(220,5,45,.35);
    }

    h1 {
      font-family: "Instrument Serif", serif;
      font-size: clamp(1.8rem, 1.3rem + 1vw, 2.4rem);
      margin-bottom: 18px;
      text-align: center;
    }

    .bar {
      height: 8px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .fill {
      height: 100%;
      width: 0;
      background: var(--primary);
    }

    .times {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.95rem;
      font-variant-numeric: tabular-nums;
      margin-bottom: 22px;
    }

    .controls {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .play {
      width: 64px;
      height: 64px;
      border: none;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
    }

    .play:hover {
      background: var(--primary-hover);
    }

    .volume {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
    }

    .volume input {
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="player">
    <div class="cover">
      <div class="disc"></div>
    </div>

    <h1>FC Bayern Goal Song</h1>

    <div class="bar" id="bar">
      <div class="fill" id="fill"></div>
    </div>

    <div class="times">
      <span id="current">0:00</span>
      <span id="total">0:00</span>
    </div>

    <div class="controls">
      <button class="play" id="toggle" aria-label="Abspielen oder pausieren">▶</button>
    </div>

    <div class="volume">
      <span>🔊</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8" aria-label="Lautstärke">
    </div>

    <audio id="audio" preload="metadata">
      <source src="/Fc-Bayern-_NEW_-Goal-song.mp3" type="audio/mpeg">
    </audio>
  </main>

  <script>
    const audio = document.getElementById('audio');
    const toggle = document.getElementById('toggle');
    const volume = document.getElementById('volume');
    const fill = document.getElementById('fill');
    const bar = document.getElementById('bar');
    const current = document.getElementById('current');
    const total = document.getElementById('total');

    const fmt = s => {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${String(sec).padStart(2, '0')}`;
    };

    const sync = () => {
      toggle.textContent = audio.paused ? '▶' : '❚❚';
    };

    toggle.addEventListener('click', async () => {
      if (audio.paused) {
        await audio.play();
      } else {
        audio.pause();
      }
      sync();
    });

    volume.addEventListener('input', () => {
      audio.volume = volume.value;
    });

    audio.addEventListener('loadedmetadata', () => {
      total.textContent = fmt(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      fill.style.width = pct + '%';
      current.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('play', sync);
    audio.addEventListener('pause', sync);
    audio.volume = 0.8;

    bar.addEventListener('click', e => {
      const rect = bar.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      if (audio.duration) audio.currentTime = pct * audio.duration;
    });
  </script>
</body>
</html>
